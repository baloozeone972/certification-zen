# .github/workflows/ci.yml
# CertifApp — CI/CD Pipeline + SonarQube Quality Gate
# Corrigé : POM parent resolvable, certif-api-rest/pom.xml présent
name: CI/CD — CertifApp

on:
  push:
    branches: [ develop, master ]
  pull_request:
    branches: [ develop, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"

jobs:

  # ── 1. Tests backend Java ──────────────────────────────────────────────────
  test-backend:
    name: "Backend — Build, Tests, JaCoCo"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       certifapp_test
          POSTGRES_USER:     certifapp
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('certif-parent/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Verify project structure
        run: |
          echo "=== Modules Maven ==="
          ls certif-parent/
          echo "=== POM parent ==="
          head -20 certif-parent/pom.xml

      - name: Build and test (Maven)
        working-directory: certif-parent
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/certifapp_test
          SPRING_DATASOURCE_USERNAME: certifapp
          SPRING_DATASOURCE_PASSWORD: test_password
          APP_JWT_SECRET:             ${{ secrets.APP_JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE:     test
        run: |
          mvn -B clean verify \
            -Dspring.profiles.active=test \
            -Dmaven.test.failure.ignore=false \
            --no-transfer-progress

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: certif-parent/**/target/site/jacoco/
          retention-days: 7

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: certif-parent/**/target/surefire-reports/
          retention-days: 7

  # ── 2. SonarQube backend ───────────────────────────────────────────────────
  sonar-backend:
    name: "Backend — SonarQube (bloque PR si Quality Gate KO)"
    runs-on: ubuntu-latest
    needs: test-backend
    if: ${{ !cancelled() && needs.test-backend.result == 'success' }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB:       certifapp_test
          POSTGRES_USER:     certifapp
          POSTGRES_PASSWORD: test_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache Maven local repo
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('certif-parent/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Cache SonarQube
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Download JaCoCo reports
        uses: actions/download-artifact@v4
        with:
          name: jacoco-reports
          path: certif-parent

      - name: SonarQube analysis
        working-directory: certif-parent
        env:
          GITHUB_TOKEN:               ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:                ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL:             ${{ secrets.SONAR_HOST_URL }}
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/certifapp_test
          SPRING_DATASOURCE_USERNAME: certifapp
          SPRING_DATASOURCE_PASSWORD: test_password
          APP_JWT_SECRET:             ${{ secrets.APP_JWT_SECRET_TEST }}
          SPRING_PROFILES_ACTIVE:     test
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=certifapp-backend \
            -Dsonar.projectName="CertifApp Backend" \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml \
            -Dsonar.junit.reportPaths=**/target/surefire-reports \
            -Dsonar.java.source=21 \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.exclusions=**/generated/**,**/*MapperImpl.java \
            -Dsonar.coverage.exclusions=**/dto/**,**/entity/**,**/exception/**,**/*Application.java \
            -Dsonar.qualitygate.wait=true \
            --no-transfer-progress

  # ── 3. Tests frontend Angular ──────────────────────────────────────────────
  test-frontend:
    name: "Frontend — Angular Build + Karma Coverage"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: certif-parent/certif-web/package-lock.json

      - name: npm ci
        working-directory: certif-parent/certif-web
        run: npm ci

      - name: Build production
        working-directory: certif-parent/certif-web
        run: npm run build -- --configuration=production

      - name: Tests + coverage LCOV
        working-directory: certif-parent/certif-web
        run: |
          npm test -- \
            --watch=false \
            --browsers=ChromeHeadless \
            --code-coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: angular-coverage
          path: certif-parent/certif-web/coverage/
          retention-days: 7

  # ── 4. SonarQube frontend ──────────────────────────────────────────────────
  sonar-frontend:
    name: "Frontend — SonarQube (bloque PR si Quality Gate KO)"
    runs-on: ubuntu-latest
    needs: test-frontend
    if: ${{ !cancelled() && needs.test-frontend.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Angular coverage
        uses: actions/download-artifact@v4
        with:
          name: angular-coverage
          path: certif-parent/certif-web/coverage

      - name: SonarQube scan (frontend)
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: certif-parent/certif-web
          args: >
            -Dsonar.projectKey=certifapp-frontend
            -Dsonar.projectName="CertifApp Frontend"
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.spec.ts
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/environments/**
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # ── 5. Docker build + push ghcr.io ────────────────────────────────────────
  docker-build:
    name: "Docker — Build & Push ghcr.io"
    runs-on: ubuntu-latest
    needs: [sonar-backend, sonar-frontend]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master') &&
      !cancelled() &&
      needs.sonar-backend.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: certif-parent
        run: mvn -B clean package -DskipTests --no-transfer-progress

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/certifapp-api
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: certif-parent/certif-api-rest
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
