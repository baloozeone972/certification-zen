# certif-parent/certif-api-rest/src/main/resources/application-test.yml
# Profil test — Testcontainers (PostgreSQL réel, pas H2)

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/certifapp_test}
    username: ${SPRING_DATASOURCE_USERNAME:certifapp}
    password: ${SPRING_DATASOURCE_PASSWORD:test_password}
    hikari:
      maximum-pool-size: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-on-validation-error: false

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.auth: false

# LLM désactivé en test (mocks injectés via @MockBean)
langchain4j:
  ollama:
    base-url: http://localhost:11434
    timeout: 5s

app:
  jwt:
    secret: ${APP_JWT_SECRET:test_jwt_secret_minimum_64_chars_XXXXXXXXXXXXXXXXXXXXXXXX}
    expiration-ms: 3600000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins:
      - http://localhost:4200
  freemium:
    daily-exam-limit: 2
    question-limit: 20
  stripe:
    secret-key: sk_test_placeholder
    webhook-secret: whsec_placeholder

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.certifapp: INFO
    org.springframework.security: WARN
    org.flywaydb: WARN
