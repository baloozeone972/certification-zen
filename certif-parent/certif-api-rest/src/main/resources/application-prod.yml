# certif-parent/certif-api-rest/src/main/resources/application-prod.yml
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    show-sql: false

app:
  jwt:
    secret: ${APP_JWT_SECRET}

logging:
  level:
    com.certifapp: INFO
    root: WARN
  file:
    path: /app/logs

server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/plain
