# certif-parent/sonar-project.properties
# Configuration SonarQube backend Java 21
# Projet : https://sonarcloud.io/project/overview?id=certifapp-backend

sonar.projectKey=certifapp-backend
sonar.projectName=CertifApp Backend
sonar.projectVersion=1.0.0
sonar.organization=baloozeone972

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.java.binaries=target/classes

sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=**/target/surefire-reports

sonar.exclusions=\
  **/generated/**,\
  **/*MapperImpl.java,\
  **/CertifAppApplication.java

sonar.coverage.exclusions=\
  **/dto/**,\
  **/entity/**,\
  **/exception/**,\
  **/*Application.java,\
  **/model/**

sonar.sourceEncoding=UTF-8
